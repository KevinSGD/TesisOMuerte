[build]
builder = "nixpacks"
buildCommand = "pip install -r proyecto/horarios_universidad/requirements.txt"

[deploy]
startCommand = "cd proyecto/horarios_universidad && PYTHONPATH=src uvicorn scheduler.interfaces.api.main:app --host 0.0.0.0 --port ${PORT:-8000}"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
