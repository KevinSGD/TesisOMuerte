<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login - GestorAulas</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>

                        "on-secondary-fixed": "#001f26",
                        "on-primary-container": "#00422b",
                        "surface-container-highest": "#2d3449",
                        "on-primary-fixed-variant": "#005236",
                        "on-tertiary-fixed": "#410005",
                        "tertiary-container": "#fc7c78",
                        "inverse-on-surface": "#283044",
                        "primary": "#4edea3",
                        "on-tertiary-fixed-variant": "#842225",
                        "surface-container-low": "#131b2e",
                        "secondary-container": "#03b5d3",
                        "on-secondary-fixed-variant": "#004e5c",
                        "secondary": "#4cd7f6",
                        "secondary-fixed": "#acedff",
                        "outline-variant": "#3c4a42",
                        "surface-container-high": "#222a3d",
                        "tertiary-fixed-dim": "#ffb3af",
                        "primary-fixed-dim": "#4edea3",

                        "surface-dim": "#0b1326",

                        "on-secondary": "#003640",
                        "on-background": "#dae2fd",

                    "borderRadius": {
                        "DEFAULT": "0.125rem",

                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "margin-mobile": "16px",
                        "gutter": "16px",
                        "unit": "4px",
                        "margin-desktop": "32px",
                        "container-max": "1440px"

                    "fontFamily": {
                        "label-md": ["JetBrains Mono"],

<style>
        /* Subtle technical grid background pattern */
        .bg-grid-pattern {
            background-image: 
                linear-gradient(to right, rgba(60, 74, 66, 0.1) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(60, 74, 66, 0.1) 1px, transparent 1px);
            background-size: 24px 24px;
        }
    </style>
</head>
<body class="bg-background text-on-surface min-h-screen flex items-center justify-center p-margin-mobile md:p-margin-desktop antialiased relative selection:bg-primary/30 selection:text-primary">
<!-- Background Decor -->
<div class="absolute inset-0 bg-grid-pattern pointer-events-none z-0"></div>
<div class="absolute inset-0 bg-gradient-to-br from-background via-background/95 to-surface-container-low pointer-events-none z-0"></div>
<!-- Login Card Container -->
<div class="w-full max-w-[420px] bg-surface-container border border-outline-variant rounded-xl p-8 md:p-10 relative z-10 flex flex-col gap-8">
<!-- Header / Identity -->
<div class="flex flex-col items-center text-center gap-4">
<div class="w-16 h-16 bg-surface-container-highest rounded-xl border border-outline-variant flex items-center justify-center transform rotate-3">
<span class="material-symbols-outlined text-primary text-[32px] transform -rotate-3" style="font-variation-settings: 'FILL' 1;">dataset</span>
</div>
<div>
<h1 class="font-headline-md text-headline-md text-primary font-bold tracking-tight">GestorAulas</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant mt-1">Core System Protocol</p>
</div>
</div>
<!-- Authentication Form -->
<form class="flex flex-col gap-6 w-full">
<!-- Credentials Block -->
<div class="flex flex-col gap-4">
<!-- Field: ID / Username -->
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider" for="username">ID / Username</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-secondary transition-colors text-lg pointer-events-none">badge</span>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg py-3 pl-10 pr-4 font-body-md text-body-md text-on-surface focus:outline-none focus:border-secondary focus:ring-1 focus:ring-secondary/50 transition-all placeholder:text-on-surface-variant/30" id="username" name="username" placeholder="Enter identification" required="" type="text"/>
</div>
</div>
<!-- Field: Password -->
<div class="flex flex-col gap-2">
<div class="flex items-center justify-between">
<label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider" for="password">Password</label>
<a class="font-label-md text-label-md text-secondary hover:text-secondary-fixed transition-colors" href="#" tabindex="-1">Recover</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-secondary transition-colors text-lg pointer-events-none">key</span>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg py-3 pl-10 pr-4 font-body-md text-body-md text-on-surface focus:outline-none focus:border-secondary focus:ring-1 focus:ring-secondary/50 transition-all placeholder:text-on-surface-variant/30" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
</div>
<!-- Action Button -->
<button class="w-full bg-primary-container hover:bg-primary text-on-primary-container font-label-md text-label-md uppercase tracking-wider py-4 rounded-lg flex items-center justify-center gap-2 transition-colors border border-transparent hover:border-primary-fixed mt-2" type="button">
                Acceder
                <span class="material-symbols-outlined text-lg">login</span>
</button>
</form>
<!-- Footer Meta -->
<div class="pt-4 border-t border-outline-variant flex justify-center">
<span class="font-label-md text-label-md text-outline flex items-center gap-1">
<span class="material-symbols-outlined text-[14px]">lock</span>
                Secure Connection Established
            </span>
</div>
</div>
</body></html>
